block.erekirlogic-reinforced-micro-processor.name = Reinforced Micro Processor
block.erekirlogic-reinforced-micro-processor.description = Runs a sequence of logic instructions in a loop. Can be used to control units and buildings.
block.erekirlogic-reinforced-logic-processor.name = Reinforced Logic Processor
block.erekirlogic-reinforced-logic-processor.description = Runs a sequence of logic instructions in a loop. Can be used to control units and buildings. Faster than the micro processor.
block.erekirlogic-reinforced-hyper-processor.name = Reinforced Hyper Processor
block.erekirlogic-reinforced-hyper-processor.description = Runs a sequence of logic instructions in a loop. Can be used to control units and buildings. Faster than the logic processor.
block.erekirlogic-reinforced-switch.name = Reinforced Switch
block.erekirlogic-reinforced-switch.description = A toggleable switch. State can be read and controlled with logic processor.
block.erekirlogic-reinforced-memory-cell.name = Reinforced Memory Cell
block.erekirlogic-reinforced-memory-cell.description = Stores information for a logic processor.
block.erekirlogic-reinforced-memory-bank.name = Reinforced Memory Bank
block.erekirlogic-reinforced-memory-bank.description = Stores information for a logic processor. High capacity.