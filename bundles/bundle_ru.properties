block.erekirlogic-reinforced-micro-processor.name = Усиленный микропроцессор
block.erekirlogic-reinforced-micro-processor.description = Выполняет последовательность логических инструкций в цикле. Может быть использован для управления единицами и постройками.
block.erekirlogic-reinforced-logic-processor.name = Усиленный логический процессор
block.erekirlogic-reinforced-logic-processor.description = Выполняет последовательность логических инструкций в цикле. Может быть использован для управления единицами и постройками. Быстрее, чем микропроцессор.
block.erekirlogic-reinforced-hyper-processor.name = Усиленный гипер процессор
block.erekirlogic-reinforced-hyper-processor.description = Выполняет последовательность логических инструкций в цикле. Может быть использован для управления единицами и постройками. Быстрее, чем логический процессор.
block.erekirlogic-reinforced-switch.name = Усиленный переключатель
block.erekirlogic-reinforced-switch.description = Переключатель. Состояние может быть считано и изменено при помощи логических процессоров.
block.erekirlogic-reinforced-memory-cell.name = Усиленная ячейка памяти
block.erekirlogic-reinforced-memory-cell.description = Хранит информацию для логического процессора.
block.erekirlogic-reinforced-memory-bank.name = Усиленный блок памяти
block.erekirlogic-reinforced-memory-bank.description = Хранит информацию для логического процессора. Большая ёмкость.
block.erekirlogic-reinforced-logic-display.name = Усиленный логический дисплей
block.erekirlogic-reinforced-logic-display.description = Отображает произвольную графику из логического процессора.
block.erekirlogic-reinforced-large-logic-display.name = Усиленный большой логический дисплей
block.erekirlogic-reinforced-large-logic-display.description = Отображает произвольную графику из логического процессора.